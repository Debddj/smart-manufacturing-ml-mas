<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demand Forecast Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #0f172a;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .card h2 {
            margin-top: 0;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            font-size: 1.25rem;
            color: #334155;
        }

        .card p {
            margin: 10px 0;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
        }

        .chart-container {
            width: 80%;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .chart-container h2 {
            text-align: center;
            margin-top: 0;
            color: #334155;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Demand Forecast Dashboard</h1>

    <div class="dashboard-container">
        <section class="card">
            <h2>Recent Orders</h2>
            <div id="recent-orders"></div>
        </section>

        <section class="card">
            <h2>Demand Summary</h2>
            <div id="demand-summary"></div>
        </section>

        <section class="card">
            <h2>Predicted Demand</h2>
            <div id="predicted-demand"></div>
        </section>

        <section class="card">
            <h2>Insights</h2>
            <div id="demand-insights"></div>
        </section>
    </div>

    <div class="chart-container">
        <h2>Demand Visualization</h2>
        <div id="demand-chart"></div>
    </div>

    <script>
        async function loadDashboard() {
            // Fetch and display Recent Orders
            const historyRes = await fetch('/api/demand/history');
            const historyData = await historyRes.json();
            const recentDiv = document.getElementById('recent-orders');
            let historyHtml = '';
            for (const item of historyData) {
                historyHtml += `<p><span>${item.item_name}:</span> <strong>${item.quantity}</strong></p>`;
            }
            recentDiv.innerHTML = historyHtml;


            // Fetch and display Demand Summary
            const aggRes = await fetch('/api/demand/aggregate');
            const aggData = await aggRes.json();
            const aggDiv = document.getElementById('demand-summary');
            let aggHtml = '';
            for (const item in aggData) {
                aggHtml += `<p><span>${item}:</span> <strong>${aggData[item]}</strong></p>`;
            }
            aggDiv.innerHTML = aggHtml;

            const trace = {
                x: Object.keys(aggData),
                y: Object.values(aggData),
                type: 'bar',
                marker: { color: '#3b82f6' }
            };
            
            const layout = {
                margin: { t: 20, b: 40, l: 40, r: 20 }
            };
            
            Plotly.react('demand-chart', [trace], layout);

            // Fetch and display Predicted Demand
            const predRes = await fetch('/api/demand/prediction');
            const predData = await predRes.json();
            const predDiv = document.getElementById('predicted-demand');
            let predHtml = '';
            for (const item in predData) {
                predHtml += `<p><span>${item}:</span> <strong>${predData[item].toUpperCase()}</strong></p>`;
            }
            predDiv.innerHTML = predHtml;

            // Compute and display Insights
            const insightsDiv = document.getElementById('demand-insights');
            const items = Object.keys(aggData);
            if (items.length > 0) {
                let mostDemanded = items[0];
                let leastDemanded = items[0];
                let totalOrders = 0;

                for (const item of items) {
                    const qty = aggData[item];
                    totalOrders += qty;
                    if (qty > aggData[mostDemanded]) mostDemanded = item;
                    if (qty < aggData[leastDemanded]) leastDemanded = item;
                }

                insightsDiv.innerHTML = `
                    <p><span>Most Demanded:</span> <strong>${mostDemanded}</strong></p>
                    <p><span>Least Demanded:</span> <strong>${leastDemanded}</strong></p>
                    <p><span>Total Orders:</span> <strong>${totalOrders}</strong></p>
                    <p><span>Unique Items:</span> <strong>${items.length}</strong></p>
                `;
            } else {
                insightsDiv.innerHTML = '<p>No data available.</p>';
            }
        }

        loadDashboard();
        setInterval(loadDashboard, 5000);
    </script>
</body>
</html>
