<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MAS Dashboard — Supply Chain Backend</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060b14;--s1:#0d1520;--s2:#111d2e;--s3:#172436;--border:#1c2e45;
  --amber:#f59e0b;--amber2:#d97706;--amber-dim:rgba(245,158,11,.12);
  --cyan:#06b6d4;--cyan-dim:rgba(6,182,212,.12);
  --green:#10b981;--green-dim:rgba(16,185,129,.1);
  --red:#ef4444;--red-dim:rgba(239,68,68,.1);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,.1);
  --text:#dde5f0;--muted:#4a6080;--muted2:#6b8299;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow:hidden;
  background-image:
    radial-gradient(ellipse at 10% 50%,rgba(6,182,212,.05) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 10%,rgba(245,158,11,.04) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 90%,rgba(168,85,247,.03) 0%,transparent 50%);
}
/* ── Header ── */
header{
  height:54px;padding:0 1.5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(8px);background:rgba(6,11,20,.9);
  position:relative;z-index:50;
}
.hdr-left{display:flex;align-items:center;gap:1rem;}
.hdr-logo{
  display:flex;align-items:center;gap:.6rem;font-size:.95rem;font-weight:700;
}
.hdr-logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--amber),var(--cyan));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.live-badge{
  display:flex;align-items:center;gap:.4rem;padding:.25rem .7rem;
  background:var(--red-dim);border:1px solid rgba(239,68,68,.3);border-radius:20px;
  font-size:.7rem;font-weight:600;color:var(--red);
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:live-pulse 1.5s infinite;}
@keyframes live-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}
.hdr-right{display:flex;align-items:center;gap:1rem;}
.metric-pill{
  padding:.25rem .8rem;border:1px solid var(--border);border-radius:20px;
  font-size:.72rem;font-family:var(--mono);color:var(--muted2);
}
.metric-pill span{color:var(--amber);font-weight:600;}
.shop-link{
  padding:.3rem .8rem;border:1px solid var(--border);border-radius:8px;
  background:var(--s2);color:var(--text);cursor:pointer;font-size:.75rem;
  text-decoration:none;transition:all .2s;font-family:inherit;
}
.shop-link:hover{border-color:var(--amber);color:var(--amber);}
/* ── Grid ── */
.grid{
  display:grid;
  grid-template-columns:1fr 340px;
  grid-template-rows:1fr 200px;
  height:calc(100vh - 54px);
  gap:0;
}
/* ── Panel base ── */
.panel{
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.panel:last-child{border-right:none;}
.panel-header{
  padding:.75rem 1.25rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(13,21,32,.6);flex-shrink:0;
}
.ph-title{
  font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
  color:var(--muted2);display:flex;align-items:center;gap:.5rem;
}
.ph-title::before{content:'';width:2px;height:12px;border-radius:2px;}
.ph-title.amber::before{background:var(--amber);}
.ph-title.cyan::before{background:var(--cyan);}
.ph-title.green::before{background:var(--green);}
.ph-title.purple::before{background:var(--purple);}
/* ── Agent Network (SVG) ── */
.network-panel{grid-column:1;grid-row:1;}
.network-content{flex:1;position:relative;overflow:hidden;}
#agentSvg{width:100%;height:100%; }
/* Agent node styles */
.agent-node .node-circle{
  fill:var(--s3);stroke:var(--border);stroke-width:2;
  transition:all .4s;filter:drop-shadow(0 0 0 transparent);
}
.agent-node.active .node-circle{
  stroke:var(--amber);fill:var(--amber-dim);
  filter:drop-shadow(0 0 12px rgba(245,158,11,.5));
  animation:node-pulse .8s infinite;
}
.agent-node.busy .node-circle{
  stroke:var(--cyan);fill:var(--cyan-dim);
  filter:drop-shadow(0 0 8px rgba(6,182,212,.4));
}
.agent-node.idle .node-circle{stroke:var(--border);fill:var(--s3);}
@keyframes node-pulse{0%,100%{filter:drop-shadow(0 0 8px rgba(245,158,11,.4))}50%{filter:drop-shadow(0 0 18px rgba(245,158,11,.8))}}
.agent-node .node-icon{font-size:20px;dominant-baseline:central;text-anchor:middle;}
.agent-node .node-label{
  font-family:'Inter',sans-serif;font-size:11px;fill:var(--muted2);
  text-anchor:middle;dominant-baseline:central;
}
.agent-node .node-status{font-size:9px;text-anchor:middle;dominant-baseline:central;font-family:var(--mono);}
.edge-line{stroke:var(--border);stroke-width:1.5;fill:none;opacity:.4;}
.edge-line.active{stroke:var(--amber);opacity:1;animation:edge-glow .6s ease-out;}
@keyframes edge-glow{from{stroke:var(--amber);opacity:1;stroke-width:3}to{stroke:var(--amber);opacity:.6;stroke-width:1.5}}
.edge-particle{opacity:0;}
.edge-particle.moving{animation:particle-move 0.7s ease-in forwards;}
/* ── Message Feed ── */
.feed-panel{grid-column:2;grid-row:1 2;border-right:none;border-bottom:none;}
.feed-content{flex:1;overflow-y:auto;padding:.5rem;}
.feed-content::-webkit-scrollbar{width:4px;}
.feed-content::-webkit-scrollbar-track{background:transparent;}
.feed-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg-card{
  padding:.6rem .75rem;margin-bottom:.4rem;border-radius:8px;
  border:1px solid var(--border);background:var(--s2);
  animation:msgIn .25s ease;transition:all .3s;
  cursor:default;
}
.msg-card:hover{border-color:var(--border);background:var(--s3);}
@keyframes msgIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.msg-header{display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem;}
.msg-type-badge{
  font-size:.6rem;font-family:var(--mono);padding:.1rem .4rem;
  border-radius:4px;font-weight:600;flex-shrink:0;
}
.badge-alert{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.badge-warning{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.3);}
.badge-info{background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.25);}
.badge-action{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.25);}
.msg-ts{font-size:.62rem;color:var(--muted);font-family:var(--mono);margin-left:auto;}
.msg-route{font-size:.72rem;color:var(--text);font-weight:500;}
.msg-route .arrow{color:var(--amber);}
.msg-detail{font-size:.68rem;color:var(--muted2);font-family:var(--mono);margin-top:.2rem;}
/* ── Bottom strip ── */
.bottom-strip{
  grid-column:1;grid-row:2;
  display:grid;grid-template-columns:1fr 1fr;
}
/* ── Demand curve ── */
.demand-panel{border-right:1px solid var(--border);}
#demandCanvas{width:100%;height:100%;}
/* ── Agent status cards ── */
.status-panel{}
.agent-cards{
  display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;
  padding:.6rem;overflow-y:auto;height:100%;
}
.agent-card{
  background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:.5rem .6rem;transition:all .3s;
}
.agent-card.active{
  border-color:var(--amber);background:var(--amber-dim);
  box-shadow:0 0 12px rgba(245,158,11,.2);
}
.agent-card.busy{border-color:var(--cyan);background:var(--cyan-dim);}
.ac-name{font-size:.65rem;font-weight:600;color:var(--muted2);margin-bottom:.3rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-status{
  display:flex;align-items:center;gap:.3rem;font-size:.68rem;font-family:var(--mono);
}
.ac-dot{width:6px;height:6px;border-radius:50%;}
.dot-idle{background:var(--muted);}
.dot-active{background:var(--amber);animation:live-pulse 1s infinite;}
.dot-busy{background:var(--cyan);}
.ac-msgs{font-size:.6rem;color:var(--muted);margin-top:.2rem;font-family:var(--mono);}
/* ── Order timeline ── */
.order-bar{
  position:fixed;bottom:0;left:0;right:340px;
  background:rgba(6,11,20,.95);border-top:1px solid var(--border);
  padding:.5rem 1.5rem;display:none;z-index:40;backdrop-filter:blur(8px);
}
.order-bar.visible{display:flex;flex-direction:column;gap:.3rem;}
.ob-header{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted2);}
.ob-stages{display:flex;align-items:center;gap:.2rem;}
.ob-step{
  display:flex;align-items:center;gap:.2rem;font-size:.65rem;
  color:var(--muted);transition:all .3s;
}
.ob-step.done{color:var(--green);}
.ob-step.active{color:var(--amber);font-weight:600;}
.ob-step .ob-dot{
  width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.6rem;
  flex-shrink:0;transition:all .3s;
}
.ob-step.done .ob-dot{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.ob-step.active .ob-dot{border-color:var(--amber);background:var(--amber-dim);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.4)}50%{box-shadow:0 0 0 5px transparent}}
.ob-sep{width:20px;height:1px;background:var(--border);flex-shrink:0;}
.ob-sep.done{background:var(--green);}
.ob-sep.active{background:var(--amber);animation:sep-glow 1s infinite;}
@keyframes sep-glow{0%,100%{opacity:.5}50%{opacity:1}}
</style>
</head>
<body>
<header>
  <div class="hdr-left">
    <div class="hdr-logo">
      <div class="hdr-logo-icon">🔗</div>
      MAS Supply Chain Backend
    </div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
  <div class="hdr-right">
    <div class="metric-pill">Orders: <span id="hdrOrders">0</span></div>
    <div class="metric-pill">Messages: <span id="hdrMsgs">0</span></div>
    <div class="metric-pill">Fill Rate: <span id="hdrFill">–</span></div>
    <a href="/" class="shop-link">🛒 Shop</a>
  </div>
</header>

<div class="grid">
  <!-- Agent Network -->
  <div class="panel network-panel">
    <div class="panel-header">
      <div class="ph-title amber">⬡ Agent Network Graph</div>
      <div style="font-size:.65rem;color:var(--muted);font-family:var(--mono)" id="activeOrder">No active order</div>
    </div>
    <div class="network-content">
      <svg id="agentSvg" viewBox="0 0 800 480"></svg>
    </div>
  </div>

  <!-- Message Feed -->
  <div class="panel feed-panel">
    <div class="panel-header">
      <div class="ph-title cyan">📨 Live Message Feed</div>
      <div style="font-size:.65rem;color:var(--muted);font-family:var(--mono)" id="feedCount">0 messages</div>
    </div>
    <div class="feed-content" id="feedContent"></div>
  </div>

  <!-- Bottom strip -->
  <div class="bottom-strip">
    <!-- Demand curve -->
    <div class="panel demand-panel">
      <div class="panel-header">
        <div class="ph-title purple">📈 Demand vs Supply Curve</div>
        <div style="font-size:.65rem;color:var(--muted);display:flex;gap:.8rem;">
          <span style="color:var(--amber)">▬</span><span style="font-size:.62rem;color:var(--muted2)">Demand</span>
          <span style="color:var(--green)">▬</span><span style="font-size:.62rem;color:var(--muted2)">Supplied</span>
          <span style="color:var(--cyan)">▬</span><span style="font-size:.62rem;color:var(--muted2)">Inventory</span>
        </div>
      </div>
      <canvas id="demandCanvas"></canvas>
    </div>

    <!-- Agent status cards -->
    <div class="panel status-panel">
      <div class="panel-header">
        <div class="ph-title green">🤖 Agent Status</div>
      </div>
      <div class="agent-cards" id="agentCards"></div>
    </div>
  </div>
</div>

<!-- Order journey bar at bottom -->
<div class="order-bar" id="orderBar">
  <div class="ob-header">
    <span>Order: <span id="obOrderId" style="color:var(--amber);font-family:var(--mono)"></span></span>
    <span id="obStatus" style="color:var(--green)"></span>
  </div>
  <div class="ob-stages" id="obStages"></div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
const API = '';
let msgCount    = 0;
let orderCount  = 0;
let totalDemand = 0, totalSupplied = 0;
let demandHistory = [];   // [{step,demand,satisfied,inventory}]
let currentOrder = null;
let evtSource    = null;

// Read ?order param from URL
const urlParams = new URLSearchParams(window.location.search);
const orderIdParam = urlParams.get('order');

// ── Agent node definitions ────────────────────────────────────────────────────
const AGENTS = [
  { id:'Customer',              icon:'👤', label:'Customer',       x:400, y:35  },
  { id:'OrderManagementAgent',  icon:'📋', label:'Order Mgmt',     x:400, y:115 },
  { id:'InventoryAgent',        icon:'📦', label:'Inventory',      x:200, y:210 },
  { id:'WarehouseAgent',        icon:'🏭', label:'Warehouse',      x:80,  y:310 },
  { id:'ProcurementAgent',      icon:'🛒', label:'Procurement',    x:600, y:210 },
  { id:'SupplierAgent',         icon:'🚛', label:'Supplier',       x:720, y:310 },
  { id:'FulfillmentAgent',      icon:'📫', label:'Fulfillment',    x:310, y:310 },
  { id:'LogisticsAgent',        icon:'🚚', label:'Logistics',      x:400, y:390 },
  { id:'LastMileDeliveryAgent', icon:'🏠', label:'Last Mile',      x:490, y:310 },
];

const EDGES = [
  ['Customer',              'OrderManagementAgent'],
  ['OrderManagementAgent',  'InventoryAgent'],
  ['OrderManagementAgent',  'ProcurementAgent'],
  ['InventoryAgent',        'WarehouseAgent'],
  ['InventoryAgent',        'FulfillmentAgent'],
  ['ProcurementAgent',      'SupplierAgent'],
  ['SupplierAgent',         'WarehouseAgent'],
  ['FulfillmentAgent',      'LogisticsAgent'],
  ['LogisticsAgent',        'LastMileDeliveryAgent'],
  ['LastMileDeliveryAgent', 'Customer'],
];

const agentStatus = {};
AGENTS.forEach(a => agentStatus[a.id] = 'idle');

// ── Build SVG agent graph ─────────────────────────────────────────────────────
function buildGraph() {
  const svg = document.getElementById('agentSvg');
  const W   = svg.parentElement.clientWidth  || 800;
  const H   = svg.parentElement.clientHeight || 480;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Scale positions
  const scaleX = W / 800;
  const scaleY = H / 480;
  const scaled = {};
  AGENTS.forEach(a => {
    scaled[a.id] = {x: a.x * scaleX, y: a.y * scaleY};
  });

  svg.innerHTML = '';

  // Defs for arrowhead
  const defs = `<defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgba(100,120,140,.6)"/>
    </marker>
    <marker id="arrow-active" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="${getComputedStyle(document.documentElement).getPropertyValue('--amber').trim()||'#f59e0b'}"/>
    </marker>
  </defs>`;
  svg.innerHTML = defs;

  // Draw edges
  EDGES.forEach(([fromId, toId]) => {
    const f = scaled[fromId], t = scaled[toId];
    if (!f || !t) return;
    const dx  = t.x - f.x, dy = t.y - f.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    const nr  = 30;  // node radius
    const fx  = f.x + dx/len*nr, fy  = f.y + dy/len*nr;
    const tx  = t.x - dx/len*nr, ty  = t.y - dy/len*nr;

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('class','edge-line');
    line.setAttribute('id',`edge-${fromId}-${toId}`);
    line.setAttribute('x1',fx); line.setAttribute('y1',fy);
    line.setAttribute('x2',tx); line.setAttribute('y2',ty);
    line.setAttribute('marker-end','url(#arrow)');
    svg.appendChild(line);
  });

  // Draw nodes
  AGENTS.forEach(a => {
    const {x,y} = scaled[a.id];
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','agent-node idle');
    g.setAttribute('id','node-'+a.id);
    g.setAttribute('transform',`translate(${x},${y})`);

    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('class','node-circle');
    circle.setAttribute('r','28');
    g.appendChild(circle);

    const icon = document.createElementNS('http://www.w3.org/2000/svg','text');
    icon.setAttribute('class','node-icon');
    icon.setAttribute('y','-4');
    icon.textContent = a.icon;
    g.appendChild(icon);

    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('class','node-label');
    label.setAttribute('y','14');
    label.textContent = a.label;
    g.appendChild(label);

    const status = document.createElementNS('http://www.w3.org/2000/svg','text');
    status.setAttribute('class','node-status');
    status.setAttribute('y','44');
    status.setAttribute('fill','var(--muted)');
    status.setAttribute('id','node-status-'+a.id);
    status.textContent = 'IDLE';
    g.appendChild(status);

    svg.appendChild(g);
  });
}

function setNodeStatus(agentId, status) {
  const node = document.getElementById('node-'+agentId);
  if (!node) return;
  node.setAttribute('class','agent-node ' + status);
  const st = document.getElementById('node-status-'+agentId);
  if (st) {
    st.textContent = status.toUpperCase();
    st.setAttribute('fill',
      status==='active' ? 'var(--amber)' :
      status==='busy'   ? 'var(--cyan)'  : 'var(--muted)');
  }
}

function animateEdge(fromId, toId) {
  const line = document.getElementById(`edge-${fromId}-${toId}`);
  if (!line) {
    // Try reverse
    const rline = document.getElementById(`edge-${toId}-${fromId}`);
    if (rline) animateEdgeLine(rline);
    return;
  }
  animateEdgeLine(line);
}

function animateEdgeLine(line) {
  line.classList.add('active');
  setTimeout(() => line.classList.remove('active'), 1000);

  // Animate a particle along the edge
  const svg    = document.getElementById('agentSvg');
  const x1 = parseFloat(line.getAttribute('x1')), y1 = parseFloat(line.getAttribute('y1'));
  const x2 = parseFloat(line.getAttribute('x2')), y2 = parseFloat(line.getAttribute('y2'));

  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('r','4');
  circle.setAttribute('fill','#f59e0b');
  circle.style.transition = 'all 0.7s ease-in';
  circle.setAttribute('cx', x1); circle.setAttribute('cy', y1);
  svg.appendChild(circle);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      circle.setAttribute('cx', x2); circle.setAttribute('cy', y2);
      circle.style.opacity = '0';
    });
  });
  setTimeout(() => svg.removeChild(circle), 800);
}

// ── Message feed ──────────────────────────────────────────────────────────────
const PRIORITY_BADGE = {
  ALERT:   'badge-alert',
  WARNING: 'badge-warning',
  INFO:    'badge-info',
  ACTION:  'badge-action',
};

function addMessageCard(ev) {
  const feed = document.getElementById('feedContent');
  const cls  = PRIORITY_BADGE[ev.priority] || 'badge-info';

  const card = document.createElement('div');
  card.className = 'msg-card';
  card.innerHTML = `
    <div class="msg-header">
      <div class="msg-type-badge ${cls}">${ev.msg_type}</div>
      <div class="msg-ts">${ev.ts}</div>
    </div>
    <div class="msg-route">
      <span style="color:var(--muted2)">${ev.from}</span>
      <span class="arrow"> → </span>
      <span style="color:var(--cyan)">${ev.to}</span>
    </div>
    <div class="msg-detail">${formatPayload(ev.payload)}</div>`;
  feed.insertBefore(card, feed.firstChild);

  // Cap at 80 messages
  while (feed.children.length > 80) feed.removeChild(feed.lastChild);
  msgCount++;
  document.getElementById('feedCount').textContent = msgCount + ' messages';
  document.getElementById('hdrMsgs').textContent   = msgCount;
}

function formatPayload(p) {
  if (!p) return '';
  return Object.entries(p)
    .filter(([k,v]) => k !== 'items')
    .slice(0, 5)
    .map(([k,v]) => `${k}=${typeof v==='number'?v.toFixed(1):v}`)
    .join('  ');
}

// ── Agent status cards ─────────────────────────────────────────────────────────
function renderAgentCards(states) {
  const container = document.getElementById('agentCards');
  container.innerHTML = '';
  const agentList = [
    {id:'OrderManagementAgent',  short:'Order Mgmt',  icon:'📋'},
    {id:'InventoryAgent',        short:'Inventory',   icon:'📦'},
    {id:'ProcurementAgent',      short:'Procurement', icon:'🛒'},
    {id:'SupplierAgent',         short:'Supplier',    icon:'🚛'},
    {id:'WarehouseAgent',        short:'Warehouse',   icon:'🏭'},
    {id:'FulfillmentAgent',      short:'Fulfillment', icon:'📫'},
    {id:'LogisticsAgent',        short:'Logistics',   icon:'🚚'},
    {id:'LastMileDeliveryAgent', short:'Last Mile',   icon:'🏠'},
  ];
  agentList.forEach(a => {
    const st    = states[a.id] || {status:'IDLE', msgs:0};
    const status= (st.status||'IDLE').toLowerCase();
    const dotCls= status==='active'?'dot-active':status==='busy'?'dot-busy':'dot-idle';
    const card  = document.createElement('div');
    card.className = `agent-card ${status}`;
    card.innerHTML = `
      <div class="ac-name">${a.icon} ${a.short}</div>
      <div class="ac-status">
        <div class="ac-dot ${dotCls}"></div>${st.status||'IDLE'}
      </div>
      <div class="ac-msgs">${st.msgs||0} msgs</div>`;
    container.appendChild(card);
  });
}

// ── Demand curve ──────────────────────────────────────────────────────────────
function drawDemandCurve() {
  const canvas = document.getElementById('demandCanvas');
  const parent = canvas.parentElement;
  canvas.width  = parent.clientWidth;
  canvas.height = parent.clientHeight - 38; // minus header
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const data = demandHistory;

  ctx.clearRect(0, 0, W, H);
  if (data.length < 2) {
    ctx.fillStyle = 'rgba(74,96,128,.3)';
    ctx.font = '12px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('Waiting for orders...', W/2, H/2);
    return;
  }

  const maxVal = Math.max(...data.map(d => Math.max(d.demand, d.inventory, d.satisfied))) * 1.15 || 100;

  const px = (i)  => (i / (data.length - 1)) * (W - 40) + 20;
  const py = (v)  => H - 20 - (v / maxVal) * (H - 35);

  // Grid lines
  ctx.strokeStyle = 'rgba(28,46,69,.8)';
  ctx.lineWidth   = 1;
  for (let i = 0; i <= 4; i++) {
    const y = py(maxVal * i / 4);
    ctx.beginPath(); ctx.moveTo(20, y); ctx.lineTo(W-5, y); ctx.stroke();
    ctx.fillStyle = 'rgba(74,96,128,.5)';
    ctx.font = '9px JetBrains Mono';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal * i / 4), 18, y + 3);
  }

  // Inventory (cyan fill)
  ctx.beginPath();
  ctx.moveTo(px(0), py(data[0].inventory));
  data.forEach((d,i) => ctx.lineTo(px(i), py(d.inventory)));
  ctx.lineTo(px(data.length-1), H);
  ctx.lineTo(px(0), H);
  ctx.closePath();
  const invGrad = ctx.createLinearGradient(0,0,0,H);
  invGrad.addColorStop(0, 'rgba(6,182,212,.2)');
  invGrad.addColorStop(1, 'rgba(6,182,212,0)');
  ctx.fillStyle = invGrad;
  ctx.fill();

  const drawLine = (color, key, dash=[]) => {
    ctx.strokeStyle = color;
    ctx.lineWidth   = 2;
    ctx.setLineDash(dash);
    ctx.beginPath();
    data.forEach((d, i) => {
      i === 0 ? ctx.moveTo(px(i), py(d[key])) : ctx.lineTo(px(i), py(d[key]));
    });
    ctx.stroke();
    ctx.setLineDash([]);
  };

  drawLine('#06b6d4', 'inventory');
  drawLine('#10b981', 'satisfied');
  drawLine('#f59e0b', 'demand', [4,3]);

  // Dots at last point
  [['#f59e0b','demand'],['#10b981','satisfied'],['#06b6d4','inventory']].forEach(([c,k]) => {
    const last = data[data.length-1];
    ctx.beginPath();
    ctx.arc(px(data.length-1), py(last[k]), 4, 0, Math.PI*2);
    ctx.fillStyle = c;
    ctx.fill();
  });
}

// ── Order journey bar ──────────────────────────────────────────────────────────
const JOURNEY_STEPS = [
  {id:'received',           icon:'📥', label:'Received'},
  {id:'inventory_check',    icon:'🔍', label:'Inventory'},
  {id:'fulfillment',        icon:'📦', label:'Fulfill'},
  {id:'warehouse_transfer', icon:'🔄', label:'Transfer'},
  {id:'procurement',        icon:'🛒', label:'Procure'},
  {id:'logistics',          icon:'🚚', label:'Logistics'},
  {id:'last_mile',          icon:'🏠', label:'Last Mile'},
  {id:'delivered',          icon:'✅', label:'Done'},
];

function buildOrderBar() {
  const container = document.getElementById('obStages');
  container.innerHTML = '';
  JOURNEY_STEPS.forEach((s, i) => {
    const step = document.createElement('div');
    step.className = 'ob-step';
    step.id = 'ob-' + s.id;
    step.innerHTML = `<div class="ob-dot" id="obd-${s.id}">${s.icon}</div><span>${s.label}</span>`;
    container.appendChild(step);
    if (i < JOURNEY_STEPS.length - 1) {
      const sep = document.createElement('div');
      sep.className = 'ob-sep';
      sep.id = `obs-${i}`;
      container.appendChild(sep);
    }
  });
}

let activeStageIdx = -1;
function advanceOrderBar(stageId) {
  const idx = JOURNEY_STEPS.findIndex(s => s.id === stageId);
  if (idx < 0) return;
  activeStageIdx = idx;

  JOURNEY_STEPS.forEach((s, i) => {
    const el  = document.getElementById('ob-' + s.id);
    const sep = document.getElementById('obs-' + (i-1));
    if (!el) return;
    if (i < idx) {
      el.className  = 'ob-step done';
      if (sep) { sep.className = 'ob-sep done'; }
    } else if (i === idx) {
      el.className  = 'ob-step active';
      if (sep) { sep.className = 'ob-sep active'; }
    } else {
      el.className  = 'ob-step';
      if (sep) { sep.className = 'ob-sep'; }
    }
  });
}

// ── SSE handler ───────────────────────────────────────────────────────────────
function handleSSE(ev) {
  if (!ev || !ev.type) return;

  if (ev.type === 'agent_message') {
    addMessageCard(ev);
    animateEdge(ev.from, ev.to);
    setNodeStatus(ev.from, 'active');
    setNodeStatus(ev.to,   'busy');
    // Update header
    if (ev.order_id) {
      document.getElementById('activeOrder').textContent = 'Order: ' + ev.order_id;
    }
  }

  if (ev.type === 'agent_status') {
    setNodeStatus(ev.agent, ev.status.toLowerCase());
  }

  if (ev.type === 'all_idle') {
    AGENTS.forEach(a => setNodeStatus(a.id, 'idle'));
    document.getElementById('activeOrder').textContent = 'No active order';
  }

  if (ev.type === 'demand_update') {
    demandHistory.push({
      step:      ev.step,
      demand:    ev.demand,
      satisfied: ev.satisfied,
      inventory: ev.inventory,
    });
    if (demandHistory.length > 60) demandHistory.shift();
    totalDemand   += ev.demand;
    totalSupplied += ev.satisfied;
    const fill = totalDemand > 0 ? (totalSupplied / totalDemand * 100).toFixed(1) + '%' : '–';
    document.getElementById('hdrFill').textContent = fill;
    drawDemandCurve();
  }

  if (ev.type === 'order_status') {
    const bar = document.getElementById('orderBar');
    if (!bar.classList.contains('visible')) {
      bar.classList.add('visible');
      buildOrderBar();
    }
    document.getElementById('obOrderId').textContent = ev.order_id || '';
    document.getElementById('obStatus').textContent  = ev.status  || '';
    advanceOrderBar(ev.stage);

    if (ev.status === 'DELIVERED') {
      orderCount++;
      document.getElementById('hdrOrders').textContent = orderCount;
      setTimeout(() => bar.classList.remove('visible'), 8000);
    }
  }

  // Keep agent cards in sync (fetch periodically instead)
}

// ── SSE connection ─────────────────────────────────────────────────────────────
function connectGlobal() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource(API + '/api/stream');
  evtSource.onmessage = e => {
    try { handleSSE(JSON.parse(e.data)); } catch(_) {}
  };
  evtSource.onerror = () => {
    setTimeout(connectGlobal, 3000);
  };
}

// ── Poll agent states ──────────────────────────────────────────────────────────
async function pollAgents() {
  try {
    const r  = await fetch(API + '/api/agents');
    const d  = await r.json();
    renderAgentCards(d);
  } catch(_) {}
}

async function pollDemandHistory() {
  try {
    const r = await fetch(API + '/api/demand-history');
    const d = await r.json();
    if (d.length > demandHistory.length) {
      demandHistory = d;
      drawDemandCurve();
    }
  } catch(_) {}
}

// ── Init ───────────────────────────────────────────────────────────────────────
buildGraph();
buildOrderBar();
connectGlobal();
renderAgentCards({});
drawDemandCurve();

setInterval(pollAgents, 800);
setInterval(drawDemandCurve, 2000);
setInterval(pollDemandHistory, 5000);
window.addEventListener('resize', () => { buildGraph(); drawDemandCurve(); });

// If opened from shop with order_id param, also subscribe to that order
if (orderIdParam) {
  const orderSrc = new EventSource(API + '/api/stream/' + orderIdParam);
  orderSrc.onmessage = e => {
    try { handleSSE(JSON.parse(e.data)); } catch(_) {}
  };
}
